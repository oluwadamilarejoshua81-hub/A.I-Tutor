<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduMind — AI Tutor</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0d0d0d;
    --cream: #faf7f2;
    --amber: #e8a020;
    --amber-light: #fdf0d5;
    --teal: #0d6e6e;
    --teal-light: #e0f4f4;
    --gray: #6b7280;
    --border: #e5e0d8;
    --bubble-user: #0d6e6e;
    --bubble-ai: #ffffff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  header {
    background: var(--ink);
    color: var(--cream);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    border-bottom: 3px solid var(--amber);
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: -0.5px;
  }

  .logo span { color: var(--amber); }

  .subject-pills {
    display: flex;
    gap: 6px;
    margin-left: auto;
    flex-wrap: wrap;
  }

  .pill {
    background: transparent;
    border: 1.5px solid rgba(255,255,255,0.3);
    color: rgba(255,255,255,0.7);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .pill:hover, .pill.active {
    background: var(--amber);
    border-color: var(--amber);
    color: var(--ink);
  }

  /* Level selector */
  .level-bar {
    background: var(--amber-light);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    font-weight: 500;
    flex-shrink: 0;
  }

  .level-bar label { color: var(--gray); }

  .level-select {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 3px 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--teal);
    cursor: pointer;
  }

  .mode-toggle {
    margin-left: auto;
    display: flex;
    gap: 4px;
  }

  .mode-btn {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    color: var(--gray);
    transition: all 0.2s;
  }

  .mode-btn.active {
    background: var(--teal);
    border-color: var(--teal);
    color: white;
  }

  /* Chat area */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* Welcome card */
  .welcome-card {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    text-align: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  }

  .welcome-card .emoji { font-size: 36px; margin-bottom: 8px; }

  .welcome-card h2 {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    margin-bottom: 6px;
  }

  .welcome-card p {
    font-size: 13px;
    color: var(--gray);
    line-height: 1.6;
    margin-bottom: 14px;
  }

  .starter-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    text-align: left;
  }

  .starter-btn {
    background: var(--teal-light);
    border: 1.5px solid var(--teal);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 12px;
    font-weight: 500;
    color: var(--teal);
    cursor: pointer;
    text-align: left;
    line-height: 1.4;
    transition: all 0.2s;
  }

  .starter-btn:hover {
    background: var(--teal);
    color: white;
  }

  /* Message bubbles */
  .msg {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .avatar.ai { background: var(--teal); color: white; }
  .avatar.user { background: var(--amber); color: var(--ink); }

  .bubble {
    max-width: 80%;
    padding: 12px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.65;
  }

  .msg.ai .bubble {
    background: white;
    border: 1.5px solid var(--border);
    border-top-left-radius: 4px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.05);
  }

  .msg.user .bubble {
    background: var(--teal);
    color: white;
    border-top-right-radius: 4px;
  }

  /* Typing indicator */
  .typing-dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    background: var(--teal);
    border-radius: 50%;
    margin: 0 2px;
    animation: blink 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; }
    40% { opacity: 1; }
  }

  /* Quiz card */
  .quiz-card {
    background: white;
    border: 2px solid var(--amber);
    border-radius: 14px;
    padding: 16px;
    margin-top: 6px;
  }

  .quiz-card .q-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--amber);
    margin-bottom: 6px;
  }

  .quiz-card .question {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 12px;
    line-height: 1.5;
  }

  .quiz-options { display: flex; flex-direction: column; gap: 6px; }

  .quiz-option {
    background: var(--cream);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
  }

  .quiz-option:hover { border-color: var(--teal); background: var(--teal-light); }
  .quiz-option.correct { background: #d1fae5; border-color: #10b981; color: #065f46; }
  .quiz-option.wrong { background: #fee2e2; border-color: #ef4444; color: #991b1b; }

  /* Input area */
  .input-area {
    background: white;
    border-top: 1.5px solid var(--border);
    padding: 12px 14px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  #userInput {
    flex: 1;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    resize: none;
    outline: none;
    max-height: 100px;
    line-height: 1.5;
    background: var(--cream);
    transition: border-color 0.2s;
  }

  #userInput:focus { border-color: var(--teal); background: white; }

  #sendBtn {
    width: 42px;
    height: 42px;
    background: var(--teal);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  #sendBtn:hover { background: #0a5858; transform: scale(1.05); }
  #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  #sendBtn svg { width: 18px; height: 18px; fill: white; }

  /* Scrollbar */
  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<header>
  <div class="logo">Edu<span>Mind</span></div>
  <div class="subject-pills">
    <button class="pill active" onclick="setSubject(this,'General')">All</button>
    <button class="pill" onclick="setSubject(this,'Math')">Math</button>
    <button class="pill" onclick="setSubject(this,'Science')">Science</button>
    <button class="pill" onclick="setSubject(this,'English')">English</button>
    <button class="pill" onclick="setSubject(this,'History')">History</button>
  </div>
</header>

<div class="level-bar">
  <label>Level:</label>
  <select class="level-select" id="levelSelect">
    <option value="beginner">🌱 Beginner</option>
    <option value="intermediate" selected>📘 Intermediate</option>
    <option value="advanced">🎓 Advanced</option>
  </select>
  <div class="mode-toggle">
    <button class="mode-btn active" onclick="setMode(this,'explain')">Explain</button>
    <button class="mode-btn" onclick="setMode(this,'quiz')">Quiz Me</button>
    <button class="mode-btn" onclick="setMode(this,'practice')">Practice</button>
  </div>
</div>

<div id="chat">
  <div class="welcome-card">
    <div class="emoji">🎓</div>
    <h2>Your AI Tutor is Ready</h2>
    <p>Ask me anything, pick a subject above, or try one of these:</p>
    <div class="starter-grid">
      <button class="starter-btn" onclick="sendStarter(this)">📐 Explain Pythagoras theorem simply</button>
      <button class="starter-btn" onclick="sendStarter(this)">🧪 How does photosynthesis work?</button>
      <button class="starter-btn" onclick="sendStarter(this)">📖 What is a metaphor? Give examples</button>
      <button class="starter-btn" onclick="sendStarter(this)">🌍 Why did World War 1 start?</button>
    </div>
  </div>
</div>

<div class="input-area">
  <textarea id="userInput" placeholder="Ask your tutor anything…" rows="1"
    onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button id="sendBtn" onclick="sendMessage()">
    <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
  </button>
</div>

<script>
  let subject = 'General';
  let mode = 'explain';
  let history = [];
  let isLoading = false;

  function setSubject(btn, s) {
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    subject = s;
  }

  function setMode(btn, m) {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = m;
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function sendStarter(btn) {
    document.getElementById('userInput').value = btn.textContent.replace(/^[^\s]+\s/, '');
    sendMessage();
  }

  function appendMsg(role, content) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = `avatar ${role}`;
    avatar.textContent = role === 'ai' ? '🎓' : '👤';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = content;

    div.appendChild(avatar);
    div.appendChild(bubble);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return bubble;
  }

  function showTyping() {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = 'msg ai';
    div.id = 'typing';

    const avatar = document.createElement('div');
    avatar.className = 'avatar ai';
    avatar.textContent = '🎓';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';

    div.appendChild(avatar);
    div.appendChild(bubble);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  function formatResponse(text) {
    return text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/`([^`]+)`/g, '<code style="background:#f3f4f6;padding:1px 5px;border-radius:4px;font-size:12px">$1</code>')
      .replace(/\n\n/g, '</p><p style="margin-top:8px">')
      .replace(/\n/g, '<br>');
  }

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text || isLoading) return;

    input.value = '';
    input.style.height = 'auto';

    // Remove welcome card
    const welcome = document.querySelector('.welcome-card');
    if (welcome) welcome.remove();

    appendMsg('user', text);

    // Build system prompt
    const level = document.getElementById('levelSelect').value;
    const modeInstructions = {
      explain: `Explain clearly for a ${level} student. Use simple language, analogies, and examples. Structure your answer with a brief intro, key points, and a real-world example.`,
      quiz: `Generate a multiple choice quiz question related to the topic. Format your response EXACTLY like this JSON and nothing else: {"question":"...","options":["A) ...","B) ...","C) ...","D) ..."],"answer":"A"}`,
      practice: `Give a practice problem or exercise for a ${level} student on this topic. Then provide a hint (not the full answer). Wait for them to try before revealing the solution.`
    };

    const systemPrompt = `You are EduMind, a friendly and encouraging AI tutor specializing in ${subject === 'General' ? 'all subjects' : subject}. 
${modeInstructions[mode]}
Student level: ${level}.
Keep responses concise but complete. Use encouraging language. If the student seems confused, offer to re-explain differently.`;

    history.push({ role: 'user', content: text });
    isLoading = true;
    document.getElementById('sendBtn').disabled = true;
    showTyping();

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: systemPrompt,
          messages: history
        })
      });

      const data = await response.json();
      const reply = data.content?.[0]?.text || 'Sorry, I had trouble responding. Please try again.';

      removeTyping();
      history.push({ role: 'assistant', content: reply });

      // Check if quiz mode and response looks like JSON
      if (mode === 'quiz') {
        try {
          const clean = reply.replace(/```json|```/g, '').trim();
          const quiz = JSON.parse(clean);
          renderQuiz(quiz);
        } catch {
          appendMsg('ai', formatResponse(reply));
        }
      } else {
        appendMsg('ai', '<p>' + formatResponse(reply) + '</p>');
      }
    } catch (err) {
      removeTyping();
      appendMsg('ai', '⚠️ Connection error. Please check your internet and try again.');
    }

    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }

  function renderQuiz(quiz) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = 'msg ai';

    const avatar = document.createElement('div');
    avatar.className = 'avatar ai';
    avatar.textContent = '🎓';

    const card = document.createElement('div');
    card.className = 'quiz-card';
    card.innerHTML = `
      <div class="q-label">📝 Quiz Question</div>
      <div class="question">${quiz.question}</div>
      <div class="quiz-options">
        ${quiz.options.map((opt, i) => `<button class="quiz-option" onclick="checkAnswer(this, '${opt.charAt(0)}', '${quiz.answer}')">${opt}</button>`).join('')}
      </div>
    `;

    div.appendChild(avatar);
    div.appendChild(card);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function checkAnswer(btn, selected, correct) {
    const opts = btn.closest('.quiz-options').querySelectorAll('.quiz-option');
    opts.forEach(o => o.disabled = true);

    if (selected === correct) {
      btn.classList.add('correct');
      btn.textContent += ' ✅ Correct!';
      appendMsg('ai', '🎉 <strong>Excellent!</strong> That\'s right! Want another question or shall we explore this topic deeper?');
    } else {
      btn.classList.add('wrong');
      opts.forEach(o => { if (o.textContent.startsWith(correct)) o.classList.add('correct'); });
      appendMsg('ai', `❌ Not quite. The correct answer is <strong>${correct}</strong>. Don't worry — mistakes help us learn! Want me to explain why?`);
    }
  }
</script>
</body>
</html>
